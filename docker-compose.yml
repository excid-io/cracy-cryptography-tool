services:
  backend:
    image: ghcr.io/cbomkit/cbomkit:${CBOMKIT_VERSION}
    depends_on:
      - db
    environment:
      CBOMKIT_DB_TYPE: postgresql
      CBOMKIT_DB_JDBC_URL: jdbc:postgresql://db:5432/postgres
      CBOMKIT_PORT: 8081
      CBOMKIT_DB_USERNAME: ${POSTGRESQL_AUTH_USERNAME}
      CBOMKIT_DB_PASSWORD: ${POSTGRESQL_AUTH_PASSWORD}
      #CBOMKIT_FRONTEND_URL_CORS: "http://localhost:8001"
      CBOMKIT_FRONTEND_URL_CORS: "http://localhost:5174"
      CBOMKIT_OPA_API_BASE: "http://opa:8181"
    ports:
      - "8081:8081"
    volumes:
      - cbomkit-volume:/home/user/.cbomkit
    restart: always
    deploy:
      resources:
        reservations:
          memory: 16g
    profiles:
      - prod
      - ext-compliance
      - dev-frontend
  frontend:
    image: ghcr.io/cbomkit/cbomkit-frontend:${CBOMKIT_VERSION}
    environment:
      VUE_APP_HTTP_API_BASE: "http://localhost:8081"
      VUE_APP_WS_API_BASE: "ws://localhost:8081"
      VUE_APP_TITLE: "CBOMkit"
      VUE_APP_VIEWER_ONLY: ${CBOMKIT_VIEWER}
    ports:
      - "8001:8000"
    restart: always
    profiles:
      - prod
      - ext-compliance
      - dev-backend
      - viewer
  db:
    image: docker.io/library/postgres:16-alpine
    user: postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${POSTGRESQL_AUTH_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRESQL_AUTH_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD", "pg_isready -U ${POSTGRESQL_AUTH_USERNAME} -d postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - "pg-volume:/var/lib/postgresql/data/"
    restart: always
    profiles:
      - prod
      - ext-compliance
      - dev
      - dev-backend
      - dev-frontend
  opa-local:
    image: docker.io/openpolicyagent/opa:1.15.1
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "/policies"
    ports:
      - "8181:8181"
    volumes:
      - "${PWD}/policies/eccg:/policies:ro"
    profiles:
      - dev-frontend
      - policy
  semgrep-local:
    build:
      context: ./semgrep-server
      dockerfile: Dockerfile
    environment:
      SEMGREP_CONFIGS_DIR: /configs
      SEMGREP_SERVER_PORT: 9091
      SEMGREP_TIMEOUT_SECONDS: 600
      LOG_LEVEL: INFO
    ports:
      - "9091:9091"
    volumes:
      - "./configs:/configs:ro"
    profiles:
      - dev-frontend
      - semgrep
volumes:
  cbomkit-volume:
  pg-volume:
