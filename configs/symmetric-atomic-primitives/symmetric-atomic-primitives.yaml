          - pattern: $KEY = open(..., "rb").read()
          - pattern: $KEY = $F.read()
          - pattern: $KEY = Path($P).read_bytes()
          - pattern: $KEY = pathlib.Path($P).read_bytes()

      # NOTE this only works with Pro engine (function returns)
      - patterns:
          - pattern: return open(...).read()
          - pattern-inside: |
