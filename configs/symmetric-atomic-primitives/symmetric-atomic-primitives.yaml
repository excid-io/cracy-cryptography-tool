      # NOTE this only works with Pro engine (Path returns)
      - patterns:
          - pattern: return Path(...).read_bytes()
          - pattern-inside: |
              def $FUNC(...):
                ...

      # NOTE this only works with Pro engine (pathlib.Path returns)
      - patterns:
          - pattern: return pathlib.Path(...).read_bytes()
          - pattern-inside: |
