rules:
  # ==========================================================
  # DISALLOWED / LEGACY PRIMITIVES
  # ==========================================================

  # ----------------------------------------------------------
  # Rule: crypto.blockcipher.3des.legacy
  #
  # Purpose:
  # Detect direct use of Triple-DES / 3DES as a block cipher or
  # through TLS/OpenSSL cipher-suite configuration strings.
  #
  # Security rationale:
  # 3DES is treated as legacy because of its 64-bit block size,
  # reduced security margin, and planned legacy-only status.
  # Prefer AES with 128, 192, or 256-bit keys.
  # ----------------------------------------------------------
  - id: crypto.blockcipher.3des.legacy
    languages: [python]
    severity: HIGH
    message: >
      Triple-DES (3DES) detected. Status: LEGACY (expires 2027).
      64-bit block size and reduced security margin.
      Replace with AES (128/192/256).
    metadata:
      category: security
      display_name: Triple-DES (3DES) Legacy Block Cipher
      policy_section: Symmetric Atomic Primitives / Block Ciphers
      standard: [FIPS-46-3, ISO-18033-3]
      status: L
    pattern-either:
      # --- PyCryptodome / PyCrypto style ---
      - pattern: Crypto.Cipher.DES3.new(...)
      - pattern: DES3.new(...)

      # --- cryptography (pyca/cryptography) style ---
      - pattern: cryptography.hazmat.primitives.ciphers.algorithms.TripleDES(...)
      - pattern: algorithms.TripleDES(...)
      - pattern: TripleDES(...)

      # --- cipher-suite strings that explicitly enable 3DES (stdlib ssl / OpenSSL bindings) ---
      - patterns:
          - pattern: $CTX.set_ciphers($CIPHERS)
          - metavariable-regex:
              metavariable: $CIPHERS
              regex: '.*(3DES|DES-CBC3|EDH-RSA-DES-CBC3|ECDHE.*DES-CBC3).*'

      # --- requests/urllib3 style: specifying ciphers via SSLContext or adapters ---
      - patterns:
          - pattern: ssl.SSLContext(...).set_ciphers($CIPHERS)
          - metavariable-regex:
              metavariable: $CIPHERS
              regex: '.*(3DES|DES-CBC3|EDH-RSA-DES-CBC3|ECDHE.*DES-CBC3).*'

  # ----------------------------------------------------------
  # Rule: python.crypto.3des.keysize.bad-explicit-length
  #
  # Purpose:
  # Detect explicitly generated 3DES key material whose length is
  # not 24 bytes.
  #
  # Security rationale:
  # 3-key TripleDES requires 24 bytes of key material, corresponding
  # to nominal 168-bit security before parity bits. Any other explicit
  # length is policy-invalid for this rule.
  # ----------------------------------------------------------
  - id: python.crypto.3des.keysize.bad-explicit-length
    languages: [python]
    severity: CRITICAL
    message: >
      3DES-168 (3-key TripleDES) policy: key material must be 24 bytes
      (192 bits including parity), corresponding to nominal 168-bit 3DES.
      Detected explicitly generated key material of a non-24-byte length that is
      used as a 3DES/TripleDES key.
    metadata:
      category: security
      display_name: 3DES Key Size (Explicit Length)
      tags: [crypto, 3des, tripledes, key-size, policy]
      confidence: HIGH
      policy_section: Symmetric Atomic Primitives / Block Ciphers
    pattern-either:
      # Inline bad key generation directly in 3DES sinks
      - patterns:
          - pattern-either:
              - pattern: DES3.new(os.urandom($N), ...)
              - pattern: DES3.new(secrets.token_bytes($N), ...)
              - pattern: DES3.new(get_random_bytes($N), ...)
              - pattern: DES3.new(Crypto.Random.get_random_bytes($N), ...)
              - pattern: Crypto.Cipher.DES3.new(os.urandom($N), ...)
              - pattern: Crypto.Cipher.DES3.new(secrets.token_bytes($N), ...)
              - pattern: Crypto.Cipher.DES3.new(get_random_bytes($N), ...)
              - pattern: Crypto.Cipher.DES3.new(Crypto.Random.get_random_bytes($N), ...)
              - pattern: algorithms.TripleDES(os.urandom($N))
              - pattern: algorithms.TripleDES(secrets.token_bytes($N))
              - pattern: algorithms.TripleDES(get_random_bytes($N))
              - pattern: algorithms.TripleDES(Crypto.Random.get_random_bytes($N))
              - pattern: TripleDES(os.urandom($N))
              - pattern: TripleDES(secrets.token_bytes($N))
              - pattern: TripleDES(get_random_bytes($N))
              - pattern: TripleDES(Crypto.Random.get_random_bytes($N))
          - metavariable-regex:
              metavariable: $N
              regex: '^(?!24$)\d+$'

      # Assignment then PyCryptodome DES3.new(...) use
      - patterns:
          - pattern: DES3.new($KEY, ...)
          - pattern-inside: |
              def $F(...):
                ...
                $KEY = os.urandom($N)
                ...
                DES3.new($KEY, ...)
                ...
          - metavariable-regex:
              metavariable: $N
              regex: '^(?!24$)\d+$'

      - patterns:
          - pattern: DES3.new($KEY, ...)
          - pattern-inside: |
              def $F(...):
                ...
                $KEY = secrets.token_bytes($N)
                ...
                DES3.new($KEY, ...)
                ...
          - metavariable-regex:
              metavariable: $N
              regex: '^(?!24$)\d+$'

      - patterns:
          - pattern: DES3.new($KEY, ...)
          - pattern-inside: |
              def $F(...):
                ...
                $KEY = get_random_bytes($N)
                ...
                DES3.new($KEY, ...)
                ...
          - metavariable-regex:
              metavariable: $N
              regex: '^(?!24$)\d+$'

      - patterns:
          - pattern: DES3.new($KEY, ...)
          - pattern-inside: |
              def $F(...):
                ...
                $KEY = Crypto.Random.get_random_bytes($N)
                ...
                DES3.new($KEY, ...)
                ...
          - metavariable-regex:
              metavariable: $N
              regex: '^(?!24$)\d+$'

      # Assignment then keyword-form DES3.new(key=...)
      - patterns:
          - pattern: DES3.new(key=$KEY, ...)
          - pattern-inside: |
              def $F(...):
                ...
                $KEY = os.urandom($N)
                ...
                DES3.new(key=$KEY, ...)
                ...
          - metavariable-regex:
              metavariable: $N
              regex: '^(?!24$)\d+$'

      - patterns:
          - pattern: DES3.new(key=$KEY, ...)
          - pattern-inside: |
              def $F(...):
                ...
                $KEY = secrets.token_bytes($N)
                ...
                DES3.new(key=$KEY, ...)
                ...
          - metavariable-regex:
              metavariable: $N
              regex: '^(?!24$)\d+$'

      - patterns:
          - pattern: DES3.new(key=$KEY, ...)
          - pattern-inside: |
              def $F(...):
                ...
                $KEY = get_random_bytes($N)
                ...
                DES3.new(key=$KEY, ...)
                ...
          - metavariable-regex:
              metavariable: $N
              regex: '^(?!24$)\d+$'

      # Assignment then cryptography TripleDES use
      - patterns:
          - pattern: algorithms.TripleDES($KEY)
          - pattern-inside: |
              def $F(...):
                ...
                $KEY = os.urandom($N)
                ...
                algorithms.TripleDES($KEY)
                ...
          - metavariable-regex:
              metavariable: $N
              regex: '^(?!24$)\d+$'

      - patterns:
          - pattern: algorithms.TripleDES($KEY)
          - pattern-inside: |
              def $F(...):
                ...
                $KEY = secrets.token_bytes($N)
                ...
                algorithms.TripleDES($KEY)
                ...
          - metavariable-regex:
              metavariable: $N
              regex: '^(?!24$)\d+$'

      - patterns:
          - pattern: algorithms.TripleDES($KEY)
          - pattern-inside: |
              def $F(...):
                ...
                $KEY = get_random_bytes($N)
                ...
                algorithms.TripleDES($KEY)
                ...
          - metavariable-regex:
              metavariable: $N
              regex: '^(?!24$)\d+$'

      - patterns:
          - pattern: TripleDES($KEY)
          - pattern-inside: |
              def $F(...):
                ...
                $KEY = os.urandom($N)
                ...
                TripleDES($KEY)
                ...
          - metavariable-regex:
              metavariable: $N
              regex: '^(?!24$)\d+$'

      - patterns:
          - pattern: TripleDES($KEY)
          - pattern-inside: |
              def $F(...):
                ...
                $KEY = secrets.token_bytes($N)
                ...
                TripleDES($KEY)
                ...
          - metavariable-regex:
              metavariable: $N
              regex: '^(?!24$)\d+$'

      - patterns:
          - pattern: TripleDES($KEY)
          - pattern-inside: |
              def $F(...):
                ...
                $KEY = get_random_bytes($N)
                ...
                TripleDES($KEY)
                ...
          - metavariable-regex:
              metavariable: $N
              regex: '^(?!24$)\d+$'

  # ----------------------------------------------------------
  # Rule: python.crypto.aes.keysize.bad-explicit-length
  #
  # Purpose:
  # Detect explicit AES key material lengths that are not one of
  # the approved AES key sizes: 16, 24, or 32 bytes.
  #
  # Security rationale:
  # AES requires 128, 192, or 256-bit keys. Random byte generation
  # or KDF output lengths outside {16, 24, 32} indicate invalid AES
  # key sizing.
  # ----------------------------------------------------------
  - id: python.crypto.aes.keysize.bad-explicit-length
    languages: [python]
    message: >
      AES key size requirement: keys must be 16/24/32 bytes (128/192/256-bit).
      Detected explicit key length that is not one of {16, 24, 32}.
    severity: CRITICAL
    metadata:
      policy_section: Symmetric Atomic Primitives / Block Ciphers
      category: security
      display_name: AES Key Size (Explicit Length)
      tags: [crypto, aes, key-size, policy]
      confidence: HIGH
    pattern-either:
      # os.urandom(n) / secrets.token_bytes(n)
      - patterns:
          - pattern: os.urandom($N)
          - metavariable-regex:
              metavariable: $N
              regex: '^(?!16$|24$|32$)\d+$'
      - patterns:
          - pattern: secrets.token_bytes($N)
          - metavariable-regex:
              metavariable: $N
              regex: '^(?!16$|24$|32$)\d+$'

      # PyCryptodome random bytes
      - patterns:
          - pattern: Crypto.Random.get_random_bytes($N)
          - metavariable-regex:
              metavariable: $N
              regex: '^(?!16$|24$|32$)\d+$'

      # cryptography KDFs with explicit length (HKDF, PBKDF2HMAC)
      - patterns:
          - pattern: HKDF(..., length=$N, ...)
          - metavariable-regex:
              metavariable: $N
              regex: '^(?!16$|24$|32$)\d+$'
      - patterns:
          - pattern: PBKDF2HMAC(..., length=$N, ...)
          - metavariable-regex:
              metavariable: $N
              regex: '^(?!16$|24$|32$)\d+$'

      # NIST SP800-56A Concat KDFs (cryptography)
      - patterns:
          - pattern: ConcatKDFHash(..., length=$N, ...)
          - metavariable-regex:
              metavariable: $N
              regex: '^(?!16$|24$|32$)\d+$'
      - patterns:
          - pattern: ConcatKDFHMAC(..., length=$N, ...)
          - metavariable-regex:
              metavariable: $N
              regex: '^(?!16$|24$|32$)\d+$'

      # ANSI X9.63 KDF (cryptography)
      - patterns:
          - pattern: X963KDF(..., length=$N, ...)
          - metavariable-regex:
              metavariable: $N
              regex: '^(?!16$|24$|32$)\d+$'

  # ----------------------------------------------------------
  # Rule: python.crypto.aes.keysize.unvalidated-external-key
  #
  # Purpose:
  # Detect AES keys that originate from external or unknown-length
  # sources and are used without validation or derivation to an
  # approved AES size.
  #
  # Security rationale:
  # External keys from files, environment variables, CLI arguments,
  # request bodies, or decoded strings may have arbitrary length.
  # They must be checked or transformed through an approved KDF.
  # ----------------------------------------------------------
  - id: python.crypto.aes.keysize.unvalidated-external-key
    languages: [python]
    mode: taint
    message: >
      AES key size requirement: key material must be 16/24/32 bytes.
      Key appears to come from an external/unknown-length source (file/env/etc.)
      and is used for AES without a length check or derivation to an approved size.
    severity: MEDIUM
    metadata:
      category: security
      display_name: AES Key Size (Unvalidated External Key)
      policy_section: Symmetric Atomic Primitives / Block Ciphers
      tags: [crypto, aes, key-size, taint]
      confidence: MEDIUM

    pattern-sources:
      - patterns:
        # ---- File reads / filesystem ----
        - pattern: $KEY = open(...).read()
        - pattern: $KEY = open(..., "rb").read()
        - pattern: $KEY = $F.read()
        - pattern: $KEY = Path($P).read_bytes()
        - pattern: $KEY = pathlib.Path($P).read_bytes()

      # NOTE this only works with Pro engine
      - patterns:
        # call to a function that returns open(...).read()
        - pattern: return open(...).read()
        - pattern-inside: |
            def $FUNC(...):
              ...

      # NOTE this only works with Pro engine
      - patterns:
        - pattern: return open(..., "rb").read()
        - pattern-inside: |
            def $FUNC(...):
              ...

      # TODO TEST
      - patterns:
        - pattern: $KEY = $FUNC(...)
        - focus-metavariable: $KEY
        - metavariable-pattern:
            metavariable: $FUNC
            pattern: |
              def $FUNC(...):
                ...
                return open(..., "rb").read()

      # NOTE this only works with Pro engine
      - patterns:
        - pattern: return $FH.read()
        - pattern-inside: |
            def $FUNC(...):
              ...
              $FH = open(...)
              ...

      # NOTE this only works with Pro engine
      - patterns:
        - pattern: return Path(...).read_bytes()
        - pattern-inside: |
            def $FUNC(...):
              ...

      # NOTE this only works with Pro engine
      - patterns:
        - pattern: return pathlib.Path(...).read_bytes()
        - pattern-inside: |
            def $FUNC(...):
              ...

      # ---- Environment / CLI / config ----
      - patterns:
        - pattern: $KEY = os.environ[$K]
        - pattern: $KEY = os.getenv(...)
        - pattern: $KEY = sys.argv[$I]

      # NOTE this only works with Pro engine
      - patterns:
        - pattern: os.environ[$K]
        - pattern-inside: |
            def $FUNC(...):
              ...

      # NOTE this only works with Pro engine
      - patterns:
        - pattern: os.getenv(...)
        - pattern-inside: |
            def $FUNC(...):
              ...

      # NOTE this only works with Pro engine
      - patterns:
        - pattern: return sys.argv[$I]
        - pattern-inside: |
            def $FUNC(...):
              ...

      # ---- Typical decoding of external strings into bytes (still unknown-length) ----
      - patterns:
        - pattern: $KEY = base64.b64decode(...)
        - pattern: $KEY = binascii.unhexlify(...)
        - pattern: $KEY = bytes.fromhex(...)

      # NOTE this only works with Pro engine
      - patterns:
        - pattern: return base64.b64decode(...)
        - pattern-inside: |
            def $F(...):
              ...

      # NOTE this only works with Pro engine
      - patterns:
        - pattern: return binascii.unhexlify(...)
        - pattern-inside: |
            def $F(...):
              ...

      # NOTE this only works with Pro engine
      - patterns:
        - pattern: return bytes.fromhex(...)
        - pattern-inside: |
            def $F(...):
              ...

      # ---- Network / request bodies (common) ----
      - pattern: $KEY = $REQ.get_data(...)
      - pattern: $KEY = $REQ.data
      - pattern: $KEY = $R.content
      - pattern: $KEY = $R.text

    pattern-sanitizers:
      #
      # (1) Explicit length validation (OR-list: each item is its own sanitizer)
      #
      - pattern: assert len($KEY) in (16, 24, 32)
      - pattern: assert len($KEY) == 16
      - pattern: assert len($KEY) == 24
      - pattern: assert len($KEY) == 32

      # Guard that rejects invalid sizes (this is the most reliable sanitizer)
      - pattern: |
          if len($KEY) not in (16, 24, 32):
              raise ...

      # Common “early return” guard variant
      - pattern: |
          if len($KEY) not in (16, 24, 32):
              return ...

      #
      # (2) Normalization to an allowed size (ONLY keep if policy allows truncation)
      # Tie the normalized key to $KEY so it sanitizes the sink variable.
      #
      - pattern: $KEY = $X[:16]
      - pattern: $KEY = $X[:24]
      - pattern: $KEY = $X[:32]

      #
      # (3) Approved KDFs producing valid AES key sizes (bind output to $KEY)
      #
      - pattern: $KEY = HKDF(..., length=16, ...).derive(...)
      - pattern: $KEY = HKDF(..., length=24, ...).derive(...)
      - pattern: $KEY = HKDF(..., length=32, ...).derive(...)

      - pattern: $KEY = PBKDF2HMAC(..., length=16, ...).derive(...)
      - pattern: $KEY = PBKDF2HMAC(..., length=24, ...).derive(...)
      - pattern: $KEY = PBKDF2HMAC(..., length=32, ...).derive(...)

      # NIST SP800-56A Concat KDFs
      - pattern: $KEY = ConcatKDFHash(..., length=16, ...).derive(...)
      - pattern: $KEY = ConcatKDFHash(..., length=24, ...).derive(...)
      - pattern: $KEY = ConcatKDFHash(..., length=32, ...).derive(...)

      - pattern: $KEY = ConcatKDFHMAC(..., length=16, ...).derive(...)
      - pattern: $KEY = ConcatKDFHMAC(..., length=24, ...).derive(...)
      - pattern: $KEY = ConcatKDFHMAC(..., length=32, ...).derive(...)

      # ANSI X9.63 KDF
      - pattern: $KEY = X963KDF(..., length=16, ...).derive(...)
      - pattern: $KEY = X963KDF(..., length=24, ...).derive(...)
      - pattern: $KEY = X963KDF(..., length=32, ...).derive(...)

    pattern-sinks:
      # PyCryptodome / PyCrypto AES constructor
      - pattern: Crypto.Cipher.AES.new($KEY, ...)
      - pattern: Crypto.Cipher.AES.new(key=$KEY, ...)
      - pattern: AES.new($KEY, ...)
      - pattern: AES.new(key=$KEY, ...)

      # pyca/cryptography AES algorithm object
      - pattern: cryptography.hazmat.primitives.ciphers.algorithms.AES($KEY, ...)
      - pattern: algorithms.AES($KEY, ...)

  # ----------------------------------------------------------
