rules:
  # ==========================================================
  # DISALLOWED / LEGACY PRIMITIVES
  # ==========================================================
  - id: crypto.blockcipher.3des.legacy
    languages: [python]
    severity: ERROR
    message: >
      Triple-DES (3DES) detected. Status: LEGACY (expires 2027).
      64-bit block size and reduced security margin.
      Replace with AES (128/192/256).
    metadata:
      category: security
      standard: [FIPS-46-3, ISO-18033-3]
      status: L
    pattern-either:
      # --- PyCryptodome / PyCrypto style ---
      - pattern: Crypto.Cipher.DES3.new(...)
      - pattern: DES3.new(...)

      # --- cryptography (pyca/cryptography) style ---
      - pattern: cryptography.hazmat.primitives.ciphers.algorithms.TripleDES(...)
      - pattern: algorithms.TripleDES(...)
      - pattern: TripleDES(...)

      # --- cipher-suite strings that explicitly enable 3DES (stdlib ssl / OpenSSL bindings) ---
      - patterns:
          - pattern: $CTX.set_ciphers($CIPHERS)
          - metavariable-regex:
              metavariable: $CIPHERS
              regex: '.*(3DES|DES-CBC3|EDH-RSA-DES-CBC3|ECDHE.*DES-CBC3).*'

      # --- requests/urllib3 style: specifying ciphers via SSLContext or adapters ---
      - patterns:
          - pattern: ssl.SSLContext(...).set_ciphers($CIPHERS)
          - metavariable-regex:
              metavariable: $CIPHERS
              regex: '.*(3DES|DES-CBC3|EDH-RSA-DES-CBC3|ECDHE.*DES-CBC3).*'

  - id: python.crypto.3des.keysize.bad-explicit-length
    languages: [python]
    message: >
      3DES-168 (3-key TripleDES) policy: key material must be 24 bytes (192 bits incl. parity),
      corresponding to nominal 168-bit 3DES. Detected explicit key length not equal to 24.
    severity: ERROR
    metadata:
      category: security
      tags: [crypto, 3des, tripledes, key-size, policy]
      confidence: HIGH
    pattern-either:
      - patterns:
          - pattern: os.urandom($N)
          - metavariable-regex:
              metavariable: $N
              regex: '^(?!24$)\d+$'
      - patterns:
          - pattern: secrets.token_bytes($N)
          - metavariable-regex:
              metavariable: $N
              regex: '^(?!24$)\d+$'
      - patterns:
          - pattern: Crypto.Random.get_random_bytes($N)
          - metavariable-regex:
              metavariable: $N
              regex: '^(?!24$)\d+$'
      - patterns:
          - pattern: HKDF(..., length=$N, ...)
          - metavariable-regex:
              metavariable: $N
              regex: '^(?!24$)\d+$'
      - patterns:
          - pattern: PBKDF2HMAC(..., length=$N, ...)
          - metavariable-regex:
              metavariable: $N
              regex: '^(?!24$)\d+$'
      # NIST SP800-56A Concat KDFs (cryptography)
      - patterns:
          - pattern: ConcatKDFHash(..., length=$N, ...)
          - metavariable-regex:
              metavariable: $N
              regex: '^(?!24$)\d+$'
      - patterns:
          - pattern: ConcatKDFHMAC(..., length=$N, ...)
          - metavariable-regex:
              metavariable: $N
              regex: '^(?!24$)\d+$'
      # ANSI X9.63 KDF (cryptography)
      - patterns:
        - pattern: X963KDF(..., length=$N, ...)
        - metavariable-regex:
            metavariable: $N
            regex: '^(?!24$)\d+$'

  #
  # Rule A: If code explicitly requests key material of the wrong length, flag it.
  #
  - id: python.crypto.aes.keysize.bad-explicit-length
    languages: [python]
    message: >
      AES key size requirement: keys must be 16/24/32 bytes (128/192/256-bit).
      Detected explicit key length that is not one of {16, 24, 32}.
    severity: ERROR
    metadata:
      category: security
      tags: [crypto, aes, key-size, policy]
      confidence: HIGH
    pattern-either:
      # os.urandom(n) / secrets.token_bytes(n)
      - patterns:
          - pattern: os.urandom($N)
          - metavariable-regex:
              metavariable: $N
              regex: '^(?!16$|24$|32$)\d+$'
      - patterns:
          - pattern: secrets.token_bytes($N)
          - metavariable-regex:
              metavariable: $N
              regex: '^(?!16$|24$|32$)\d+$'

      # PyCryptodome random bytes
      - patterns:
          - pattern: Crypto.Random.get_random_bytes($N)
          - metavariable-regex:
              metavariable: $N
              regex: '^(?!16$|24$|32$)\d+$'

      # cryptography KDFs with explicit length (HKDF, PBKDF2HMAC)
      - patterns:
          - pattern: HKDF(..., length=$N, ...)
          - metavariable-regex:
              metavariable: $N
              regex: '^(?!16$|24$|32$)\d+$'
      - patterns:
          - pattern: PBKDF2HMAC(..., length=$N, ...)
          - metavariable-regex:
              metavariable: $N
              regex: '^(?!16$|24$|32$)\d+$'
      # NIST SP800-56A Concat KDFs (cryptography)
      - patterns:
          - pattern: ConcatKDFHash(..., length=$N, ...)
          - metavariable-regex:
              metavariable: $N
              regex: '^(?!16$|24$|32$)\d+$'
      - patterns:
          - pattern: ConcatKDFHMAC(..., length=$N, ...)
          - metavariable-regex:
              metavariable: $N
              regex: '^(?!16$|24$|32$)\d+$'
       # ANSI X9.63 KDF (cryptography)
      - patterns:
          - pattern: X963KDF(..., length=$N, ...)
          - metavariable-regex:
              metavariable: $N
              regex: '^(?!16$|24$|32$)\d+$'

  #
  # Rule B: Dataflow rule — key comes from an unknown-length source (file/env/etc.)
  # and is used as an AES key WITHOUT being validated/normalized to 16/24/32.
  #
  - id: python.crypto.aes.keysize.unvalidated-external-key
    languages: [python]
    mode: taint
    message: >
      AES key size requirement: key material must be 16/24/32 bytes.
      Key appears to come from an external/unknown-length source (file/env/etc.)
      and is used for AES without a length check or derivation to an approved size.
    severity: HIGH
    metadata:
      category: security
      tags: [crypto, aes, key-size, taint]
      confidence: MEDIUM

    pattern-sources:
      - patterns:
        # ---- File reads / filesystem ----
        - pattern: $KEY = open(...).read()
        - pattern: $KEY = open(..., "rb").read()
        - pattern: $KEY = $F.read()
        - pattern: $KEY = Path($P).read_bytes()
        - pattern: $KEY = pathlib.Path($P).read_bytes()
      # NOTE this only works with Pro engine
      - patterns:
        # call to a function that returns open(...).read()
        - pattern: return open(...).read()
        - pattern-inside: |
            def $FUNC(...):
              ...
      # NOTE this only works with Pro engine
      - patterns: 
        - pattern: return open(..., "rb").read()
        - pattern-inside: |
            def $FUNC(...):
              ...
      # TODO TEST
      - patterns:
        - pattern: $KEY = $FUNC(...)
        - focus-metavariable: $KEY
        - metavariable-pattern:
            metavariable: $FUNC
            pattern: |
              def $FUNC(...):
                ...
                return open(..., "rb").read()
      # NOTE this only works with Pro engine
      - patterns:
        - pattern: return $FH.read()
        - pattern-inside: |
            def $FUNC(...):
              ...
              $FH = open(...)
              ...
      # NOTE this only works with Pro engine
      - patterns: 
        - pattern: return Path(...).read_bytes()
        - pattern-inside: |
            def $FUNC(...):
              ...
      # NOTE this only works with Pro engine
      - patterns: 
        - pattern: return pathlib.Path(...).read_bytes()
        - pattern-inside: |
            def $FUNC(...):
              ...

      # ---- Environment / CLI / config ----
      - patterns:
        - pattern: $KEY = os.environ[$K]
        - pattern: $KEY = os.getenv(...)
        - pattern: $KEY = sys.argv[$I]
      # NOTE this only works with Pro engine
      - patterns:
        - pattern: os.environ[$K]
        - pattern-inside: |
            def $FUNC(...):
              ...
      # NOTE this only works with Pro engine
      - patterns:
        - pattern: os.getenv(...)
        - pattern-inside: |
            def $FUNC(...):
              ...
      # NOTE this only works with Pro engine
      - patterns:
        - pattern: return sys.argv[$I]
        - pattern-inside: |
            def $FUNC(...):
              ...


      # ---- Typical decoding of external strings into bytes (still unknown-length) ----
      - patterns:
        - pattern: $KEY = base64.b64decode(...)
        - pattern: $KEY = binascii.unhexlify(...)
        - pattern: $KEY = bytes.fromhex(...)
      - patterns:
      # NOTE this only works with Pro engine
        - pattern: return base64.b64decode(...)
        - pattern-inside: |
            def $F(...):
              ...
      # NOTE this only works with Pro engine
      - patterns:
        - pattern: return binascii.unhexlify(...)
        - pattern-inside: |
            def $F(...):
              ...
      # NOTE this only works with Pro engine
      - patterns:
        - pattern: return bytes.fromhex(...)
        - pattern-inside: |
            def $F(...):
              ...

      # ---- Network / request bodies (common) ----
      - pattern: $KEY = $REQ.get_data(...)
      - pattern: $KEY = $REQ.data
      - pattern: $KEY = $R.content
      - pattern: $KEY = $R.text

    pattern-sanitizers:
      #
      # (1) Explicit length validation (OR-list: each item is its own sanitizer)
      #
      - pattern: assert len($KEY) in (16, 24, 32)
      - pattern: assert len($KEY) == 16
      - pattern: assert len($KEY) == 24
      - pattern: assert len($KEY) == 32

      # Guard that rejects invalid sizes (this is the most reliable sanitizer)
      - pattern: |
          if len($KEY) not in (16, 24, 32):
              raise ...

      # Common “early return” guard variant
      - pattern: |
          if len($KEY) not in (16, 24, 32):
              return ...

      #
      # (2) Normalization to an allowed size (ONLY keep if policy allows truncation)
      # Tie the normalized key to $KEY so it sanitizes the sink variable.
      #
      - pattern: $KEY = $X[:16]
      - pattern: $KEY = $X[:24]
      - pattern: $KEY = $X[:32]

      #
      # (3) Approved KDFs producing valid AES key sizes (bind output to $KEY)
      #
      - pattern: $KEY = HKDF(..., length=16, ...).derive(...)
      - pattern: $KEY = HKDF(..., length=24, ...).derive(...)
      - pattern: $KEY = HKDF(..., length=32, ...).derive(...)

      - pattern: $KEY = PBKDF2HMAC(..., length=16, ...).derive(...)
      - pattern: $KEY = PBKDF2HMAC(..., length=24, ...).derive(...)
      - pattern: $KEY = PBKDF2HMAC(..., length=32, ...).derive(...)

      # NIST SP800-56A Concat KDFs
      - pattern: $KEY = ConcatKDFHash(..., length=16, ...).derive(...)
      - pattern: $KEY = ConcatKDFHash(..., length=24, ...).derive(...)
      - pattern: $KEY = ConcatKDFHash(..., length=32, ...).derive(...)

      - pattern: $KEY = ConcatKDFHMAC(..., length=16, ...).derive(...)
      - pattern: $KEY = ConcatKDFHMAC(..., length=24, ...).derive(...)
      - pattern: $KEY = ConcatKDFHMAC(..., length=32, ...).derive(...)

      # ANSI X9.63 KDF
      - pattern: $KEY = X963KDF(..., length=16, ...).derive(...)
      - pattern: $KEY = X963KDF(..., length=24, ...).derive(...)
      - pattern: $KEY = X963KDF(..., length=32, ...).derive(...)

    pattern-sinks:
      # PyCryptodome / PyCrypto AES constructor
      - pattern: Crypto.Cipher.AES.new($KEY, ...)
      - pattern: Crypto.Cipher.AES.new(key=$KEY, ...)
      - pattern: AES.new($KEY, ...)
      - pattern: AES.new(key=$KEY, ...)

      # pyca/cryptography AES algorithm object
      - pattern: cryptography.hazmat.primitives.ciphers.algorithms.AES($KEY, ...)
      - pattern: algorithms.AES($KEY, ...)

  #
  # Rule B (3DES): Dataflow rule — key comes from an unknown-length source (file/env/etc.)
  # and is used as a 3DES key WITHOUT being validated/normalized to 24 bytes.
  #
  - id: python.crypto.3des.keysize.unvalidated-external-key
    languages: [python]
    mode: taint
    message: >
      3DES-168 (3-key TripleDES) policy: key material must be 24 bytes.
      Key appears to come from an external/unknown-length source (file/env/etc.)
      and is used for 3DES/TripleDES without a strict length check or derivation to 24 bytes.
    severity: ERROR
    metadata:
      category: security
      tags: [crypto, 3des, tripledes, key-size, taint]
      confidence: MEDIUM

    pattern-sources:
      - patterns:
          # ---- File reads / filesystem ----
          - pattern: $KEY = open(...).read()
          - pattern: $KEY = open(..., "rb").read()
          - pattern: $KEY = $F.read()
          - pattern: $KEY = Path($P).read_bytes()
          - pattern: $KEY = pathlib.Path($P).read_bytes()

      # NOTE this only works with Pro engine (function returns)
      - patterns:
          - pattern: return open(...).read()
          - pattern-inside: |
              def $FUNC(...):
                ...
      # NOTE this only works with Pro engine (function returns)
      - patterns:
          - pattern: return open(..., "rb").read()
          - pattern-inside: |
              def $FUNC(...):
                ...

      # TODO TEST (your local “call-site -> definition” attempt)
      - patterns:
          - pattern: $KEY = $FUNC(...)
          - focus-metavariable: $KEY
          - metavariable-pattern:
              metavariable: $FUNC
              pattern: |
                def $FUNC(...):
                  ...
                  return open(..., "rb").read()

      # NOTE this only works with Pro engine (returning a handle read)
      - patterns:
          - pattern: return $FH.read()
          - pattern-inside: |
              def $FUNC(...):
                ...
                $FH = open(...)
                ...

      # NOTE this only works with Pro engine (Path returns)
      - patterns:
          - pattern: return Path(...).read_bytes()
          - pattern-inside: |
              def $FUNC(...):
                ...
      # NOTE this only works with Pro engine (pathlib.Path returns)
      - patterns:
          - pattern: return pathlib.Path(...).read_bytes()
          - pattern-inside: |
              def $FUNC(...):
                ...

      - patterns:
          # ---- Environment / CLI / config ----
          - pattern: $KEY = os.environ[$K]
          - pattern: $KEY = os.getenv(...)
          - pattern: $KEY = sys.argv[$I]

      # NOTE this only works with Pro engine (env access in helper)
      - patterns:
          - pattern: os.environ[$K]
          - pattern-inside: |
              def $FUNC(...):
                ...
      # NOTE this only works with Pro engine (getenv in helper)
      - patterns:
          - pattern: os.getenv(...)
          - pattern-inside: |
              def $FUNC(...):
                ...
      # NOTE this only works with Pro engine (argv returned from helper)
      - patterns:
          - pattern: return sys.argv[$I]
          - pattern-inside: |
              def $FUNC(...):
                ...

      - patterns:
          # ---- Typical decoding of external strings into bytes (still unknown-length) ----
          - pattern: $KEY = base64.b64decode(...)
          - pattern: $KEY = binascii.unhexlify(...)
          - pattern: $KEY = bytes.fromhex(...)

      # NOTE this only works with Pro engine (decoding returned from helper)
      - patterns:
          - pattern: return base64.b64decode(...)
          - pattern-inside: |
              def $F(...):
                ...
      # NOTE this only works with Pro engine (decoding returned from helper)
      - patterns:
          - pattern: return binascii.unhexlify(...)
          - pattern-inside: |
              def $F(...):
                ...
      # NOTE this only works with Pro engine (decoding returned from helper)
      - patterns:
          - pattern: return bytes.fromhex(...)
          - pattern-inside: |
              def $F(...):
                ...

      # ---- Network / request bodies (common) ----
      - pattern: $KEY = $REQ.get_data(...)
      - pattern: $KEY = $REQ.data
      - pattern: $KEY = $R.content
      - pattern: $KEY = $R.text

    pattern-sanitizers:
      #
      # (1) Explicit length validation — MUST be 24 bytes for 3-key 3DES.
      #
      - pattern: assert len($KEY) == 24

      - pattern: |
          if len($KEY) != 24:
              raise ...

      - pattern: |
          if len($KEY) != 24:
              return ...

      #
      # (2) Normalization to 24 bytes (ONLY keep if policy allows truncation)
      #
      - pattern: $KEY = $X[:24]

      #
      # (3) Approved KDFs producing 24-byte key material (bind output to $KEY)
      #
      - pattern: $KEY = HKDF(..., length=24, ...).derive(...)
      - pattern: $KEY = PBKDF2HMAC(..., length=24, ...).derive(...)

      # NIST SP800-56A Concat KDFs
      - pattern: $KEY = ConcatKDFHash(..., length=24, ...).derive(...)
      - pattern: $KEY = ConcatKDFHMAC(..., length=24, ...).derive(...)

      # ANSI X9.63 KDF
      - pattern: $KEY = X963KDF(..., length=24, ...).derive(...)

      # PyCryptodome parity adjustment (optional)
      - pattern: $KEY = DES3.adjust_key_parity($KEY)

    pattern-sinks:
      # PyCryptodome / PyCrypto 3DES constructor
      - pattern: Crypto.Cipher.DES3.new($KEY, ...)
      - pattern: Crypto.Cipher.DES3.new(key=$KEY, ...)
      - pattern: DES3.new($KEY, ...)
      - pattern: DES3.new(key=$KEY, ...)

      # pyca/cryptography TripleDES algorithm object
      - pattern: cryptography.hazmat.primitives.ciphers.algorithms.TripleDES($KEY, ...)
      - pattern: algorithms.TripleDES($KEY, ...)
      - pattern: TripleDES($KEY, ...)
      # ==========================================================
  # HASH LENGTH POLICY (per approved table)
  #
  # Allowed:
  #   SHA-2: 256 / 384 / 512 / 512-256
  #   SHA-3: 256 / 384 / 512
  #
  # Legacy (L [2025]):
  #   SHA-224
  #   SHA-512/224
  # ==========================================================

  # ----------------------------------------------------------
  # hashlib — SHA-224
  # ----------------------------------------------------------
  - id: python.hash.hashlib.sha224.legacy
    languages: [python]
    severity: ERROR
    message: SHA-224 is LEGACY (L [2025]). Use SHA-256/384/512 or SHA-512/256.
    metadata: {category: security, tags: [crypto, hash, sha224, legacy]}
    pattern-either:
      - pattern: hashlib.sha224(...)
      - pattern: hashlib.new("sha224", ...)
      - pattern: hashlib.new('sha224', ...)
      - patterns:
          - pattern: hashlib.new($ALG, ...)
          - metavariable-regex:
              metavariable: $ALG
              regex: '^(?i)sha224$'

  # ----------------------------------------------------------
  # hashlib — SHA-512/224
  # ----------------------------------------------------------
  - id: python.hash.hashlib.sha512_224.legacy
    languages: [python]
    severity: ERROR
    message: SHA-512/224 is LEGACY (L [2025). Use SHA-512/256 or SHA-256/384/512.
    metadata: {category: security, tags: [crypto, hash, sha512-224, legacy]}
    pattern-either:
      - pattern: hashlib.sha512_224(...)
      - pattern: hashlib.new("sha512_224", ...)
      - pattern: hashlib.new('sha512_224', ...)
      - patterns:
          - pattern: hashlib.new($ALG, ...)
          - metavariable-regex:
              metavariable: $ALG
              regex: '^(?i)sha512_224$'

  # ----------------------------------------------------------
  # cryptography — SHA-224
  # ----------------------------------------------------------
  - id: python.hash.crypto.sha224.legacy
    languages: [python]
    severity: ERROR
    message: cryptography SHA224 is LEGACY (L [2025]).
    metadata: {category: security, tags: [crypto, hash, sha224, legacy]}
    pattern-either:
      - pattern: hashes.SHA224(...)
      - pattern: cryptography.hazmat.primitives.hashes.SHA224(...)
      - pattern: SHA224(...)

  # ----------------------------------------------------------
  # cryptography — SHA-512/224
  # ----------------------------------------------------------
  - id: python.hash.crypto.sha512_224.legacy
    languages: [python]
    severity: ERROR
    message: cryptography SHA512/224 is LEGACY (L [2025]).
    metadata: {category: security, tags: [crypto, hash, sha512-224, legacy]}
    pattern-either:
      - pattern: hashes.SHA512_224(...)
      - pattern: cryptography.hazmat.primitives.hashes.SHA512_224(...)
      - pattern: SHA512_224(...)

  # ----------------------------------------------------------
  # HMAC (stdlib)
  # ----------------------------------------------------------
  - id: python.hash.hmac.legacy
    languages: [python]
    severity: ERROR
    message: HMAC uses a LEGACY hash (SHA-224 or SHA-512/224).
    metadata: {category: security, tags: [crypto, hmac, legacy]}
    pattern-either:
      - pattern: hmac.new(..., digestmod=hashlib.sha224)
      - pattern: hmac.new(..., digestmod=hashlib.sha512_224)

  # ----------------------------------------------------------
  # HMAC (cryptography)
  # ----------------------------------------------------------
  - id: python.hash.crypto.hmac.legacy
    languages: [python]
    severity: ERROR
    message: cryptography HMAC uses a LEGACY hash (SHA-224 or SHA-512/224).
    metadata: {category: security, tags: [crypto, hmac, legacy]}
    pattern-either:
      - pattern: HMAC(..., hashes.SHA224(), ...)
      - pattern: HMAC(..., hashes.SHA512_224(), ...)

  # ----------------------------------------------------------
  # KDFs — cryptography (HKDF, PBKDF2, Concat, X9.63)
  # ----------------------------------------------------------
  - id: python.hash.crypto.kdf.legacy
    languages: [python]
    severity: ERROR
    message: KDF uses a LEGACY hash (SHA-224 or SHA-512/224).
    metadata: {category: security, tags: [crypto, kdf, legacy]}
    pattern-either:
      - pattern: HKDF(..., algorithm=hashes.SHA224(), ...)
      - pattern: HKDF(..., algorithm=hashes.SHA512_224(), ...)
      - pattern: PBKDF2HMAC(..., algorithm=hashes.SHA224(), ...)
      - pattern: PBKDF2HMAC(..., algorithm=hashes.SHA512_224(), ...)
      - pattern: ConcatKDFHash(..., algorithm=hashes.SHA224(), ...)
      - pattern: ConcatKDFHash(..., algorithm=hashes.SHA512_224(), ...)
      - pattern: ConcatKDFHMAC(..., algorithm=hashes.SHA224(), ...)
      - pattern: ConcatKDFHMAC(..., algorithm=hashes.SHA512_224(), ...)
      - pattern: X963KDF(..., algorithm=hashes.SHA224(), ...)
      - pattern: X963KDF(..., algorithm=hashes.SHA512_224(), ...)

  # ----------------------------------------------------------
  # PyCryptodome
  # ----------------------------------------------------------
  - id: python.hash.pycryptodome.legacy
    languages: [python]
    severity: ERROR
    message: PyCryptodome SHA-224 or SHA-512/224 is LEGACY (L [2025]).
    metadata: {category: security, tags: [crypto, hash, legacy, pycryptodome]}
    pattern-either:
      - pattern: Crypto.Hash.SHA224.new(...)
      - pattern: SHA224.new(...)
      - pattern: Crypto.Hash.SHA512_224.new(...)
      - pattern: SHA512_224.new(...)

  #
  #    ENFORCEMENT: Flag “secret splitting” patterns unless Shamir is used.
  #    This is the main enforcement rule.
  #
  - id: crypto.secretsharing.require-shamir
    message: >
      Potential secret sharing / secret splitting detected, but not via approved Shamir API.
      Use Shamir secret sharing (e.g., Crypto.Protocol.SecretSharing.Shamir) instead of DIY splitting/chunking.
    languages: [python]
    severity: WARNING

    # If ANY of these "splitting" patterns appear, we flag...
    patterns:
      - pattern-either:
          # Common ad-hoc chunking/splitting patterns
          - pattern: $SECRET.split(...)
          - pattern: textwrap.wrap($SECRET, ...)
          - pattern: chunks = [$SECRET[$I:$J] for $I, $J in $R]
          - pattern: "[$SECRET[$I:$J] for $I, $J in $R]"
          - pattern: $SECRET[$I:$J]
          - pattern: bytes($SECRET)[...]
          - pattern: base64.b64encode($SECRET).decode(...).split(...)
          - pattern: base64.b64encode($SECRET).split(...)
          - pattern: base64.b64decode($SECRET).split(...)

          # “XOR sharing” / “split into n parts then xor” style signals
          - pattern: $A ^ $B
          - pattern: functools.reduce(operator.xor, $X, ...)

          # Storing shares in lists/dicts by index (very rough heuristic)
          - pattern: $SHARES[$IDX] = $PART
          - pattern: $SHARES.append($PART)
      # ...BUT do NOT flag if the file imports/uses the allowlisted Shamir API.
      - pattern-not-inside: |
          from Crypto.Protocol.SecretSharing import Shamir
          ...