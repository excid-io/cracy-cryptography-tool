      - pattern: HMAC(..., hashes.SHA512_224(), ...)

  # ----------------------------------------------------------
  # Rule: python.hash.crypto.kdf.legacy
  #
  # Purpose:
  # Detect KDF constructions that use legacy SHA-224 or SHA-512/224
  # as the underlying hash algorithm.
  #
  # Security rationale:
  # KDFs inherit security assumptions from their hash or PRF basis.
  # Legacy hash functions should not be used in HKDF, PBKDF2HMAC,
  # ConcatKDF, or X963KDF constructions.
  # ----------------------------------------------------------
  - id: python.hash.crypto.kdf.legacy
    languages: [python]
    severity: HIGH
    message: KDF uses a LEGACY hash (SHA-224 or SHA-512/224).
    metadata:
      category: security
      tags: [crypto, kdf, legacy]
      display_name: KDF Legacy Hash Function
      policy_section: Symmetric Atomic Primitives / Hashes
    pattern-either:
      - pattern: HKDF(..., algorithm=hashes.SHA224(), ...)
      - pattern: HKDF(..., algorithm=hashes.SHA512_224(), ...)
      - pattern: PBKDF2HMAC(..., algorithm=hashes.SHA224(), ...)
      - pattern: PBKDF2HMAC(..., algorithm=hashes.SHA512_224(), ...)
      - pattern: ConcatKDFHash(..., algorithm=hashes.SHA224(), ...)
      - pattern: ConcatKDFHash(..., algorithm=hashes.SHA512_224(), ...)
      - pattern: ConcatKDFHMAC(..., algorithm=hashes.SHA224(), ...)
      - pattern: ConcatKDFHMAC(..., algorithm=hashes.SHA512_224(), ...)
      - pattern: X963KDF(..., algorithm=hashes.SHA224(), ...)
      - pattern: X963KDF(..., algorithm=hashes.SHA512_224(), ...)

