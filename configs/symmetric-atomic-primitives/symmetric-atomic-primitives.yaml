      # ---- Typical decoding of external strings into bytes (still unknown-length) ----
      - patterns:
          - pattern: $KEY = base64.b64decode(...)
          - pattern: $KEY = binascii.unhexlify(...)
          - pattern: $KEY = bytes.fromhex(...)

      # NOTE this only works with Pro engine (decoding returned from helper)
      - patterns:
