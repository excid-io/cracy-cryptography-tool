  # ----------------------------------------------------------
  # Rule: crypto.secretsharing.require-shamir
  #
  # Purpose:
  # Detect ad-hoc secret splitting, chunking, XOR sharing, or manual
  # share storage patterns that are not using an approved Shamir API.
  #
  # Security rationale:
  # Secret sharing should use a well-defined Shamir secret sharing
  # construction rather than DIY splitting/chunking, which may not
  # provide threshold security or robust reconstruction guarantees.
  # ----------------------------------------------------------
  - id: crypto.secretsharing.require-shamir
    message: >
      Potential secret sharing / secret splitting detected, but not via approved Shamir API.
      Use Shamir secret sharing (e.g., Crypto.Protocol.SecretSharing.Shamir) instead of DIY splitting/chunking.
    metadata:
      category: security
      tags: [crypto, secret-sharing, secret-splitting, shamir, policy]
      display_name: Secret Sharing / Splitting Without Shamir
      confidence: LOW
      policy_section: Symmetric Atomic Primitives / Secret Sharing
    languages: [python]
    severity: WARNING

    # If ANY of these "splitting" patterns appear, we flag...
    patterns:
      - pattern-either:
          # Common ad-hoc chunking/splitting patterns
          - pattern: $SECRET.split(...)
          - pattern: textwrap.wrap($SECRET, ...)
          - pattern: chunks = [$SECRET[$I:$J] for $I, $J in $R]
          - pattern: "[$SECRET[$I:$J] for $I, $J in $R]"
          - pattern: $SECRET[$I:$J]
          - pattern: bytes($SECRET)[...]
          - pattern: base64.b64encode($SECRET).decode(...).split(...)
          - pattern: base64.b64encode($SECRET).split(...)
          - pattern: base64.b64decode($SECRET).split(...)

          # “XOR sharing” / “split into n parts then xor” style signals
          - pattern: $A ^ $B
          - pattern: functools.reduce(operator.xor, $X, ...)

          # Storing shares in lists/dicts by index (very rough heuristic)
          - pattern: $SHARES[$IDX] = $PART
          - pattern: $SHARES.append($PART)

      # ...BUT do NOT flag if the file imports/uses the allowlisted Shamir API.
      - pattern-not-inside: |
          from Crypto.Protocol.SecretSharing import Shamir
          ...