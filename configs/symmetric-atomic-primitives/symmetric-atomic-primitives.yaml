      - pattern: cryptography.hazmat.primitives.ciphers.algorithms.TripleDES($KEY, ...)
      - pattern: algorithms.TripleDES($KEY, ...)
      - pattern: TripleDES($KEY, ...)

  # ==========================================================
  # HASH LENGTH POLICY
  # ==========================================================

  # ----------------------------------------------------------
  # Rule: python.hash.hashlib.sha224.legacy
  #
  # Purpose:
  # Detect use of SHA-224 through Python hashlib.
  #
  # Security rationale:
  # SHA-224 is treated as legacy. Prefer SHA-256, SHA-384,
  # SHA-512, or SHA-512/256.
  # ----------------------------------------------------------
  - id: python.hash.hashlib.sha224.legacy
    languages: [python]
    severity: CRITICAL
    message: SHA-224 is LEGACY (L [2025]). Use SHA-256/384/512 or SHA-512/256.
    metadata:
      category: security
      tags: [crypto, hash, sha224, legacy]
      display_name: hashlib SHA-224 Legacy Hash Function
      policy_section: Symmetric Atomic Primitives / Hashes

    pattern-either:
      - pattern: hashlib.sha224(...)
      - pattern: hashlib.new("sha224", ...)
      - pattern: hashlib.new('sha224', ...)
      - patterns:
          - pattern: hashlib.new($ALG, ...)
          - metavariable-regex:
              metavariable: $ALG
              regex: '^(?i)sha224$'

  # ----------------------------------------------------------
  # Rule: python.hash.hashlib.sha512_224.legacy
  #
  # Purpose:
  # Detect use of SHA-512/224 through Python hashlib.
  #
  # Security rationale:
  # SHA-512/224 is treated as legacy. Prefer SHA-512/256 or
  # approved SHA-2 output sizes such as SHA-256, SHA-384, or SHA-512.
  # ----------------------------------------------------------
  - id: python.hash.hashlib.sha512_224.legacy
    languages: [python]
    severity: CRITICAL
    message: SHA-512/224 is LEGACY (L [2025). Use SHA-512/256 or SHA-256/384/512.
    metadata:
      category: security
      tags: [crypto, hash, sha512-224, legacy]
      display_name: hashlib SHA-512/224 Legacy Hash Function
    pattern-either:
      - pattern: hashlib.sha512_224(...)
      - pattern: hashlib.new("sha512_224", ...)
      - pattern: hashlib.new('sha512_224', ...)
      - patterns:
          - pattern: hashlib.new($ALG, ...)
          - metavariable-regex:
              metavariable: $ALG
              regex: '^(?i)sha512_224$'

